<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="todo-container">
        <div class="todo-app">
            <h1>📝 My To-Do List</h1>
            
            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..." 
                    class="todo-input"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats">
                <span>Total: <span id="totalCount">0</span></span>
                <span>Active: <span id="activeCount">0</span></span>
                <span>Completed: <span id="completedCount">0</span></span>
            </div>

            <ul id="todoList" class="todo-list">
                <!-- Tasks will be added here -->
            </ul>

            <div class="empty-state" id="emptyState">
                <p>📭 No tasks yet. Add one to get started!</p>
            </div>

            <button id="clearCompleted" class="clear-completed-btn">Clear Completed</button>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
